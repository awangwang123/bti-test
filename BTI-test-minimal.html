<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d1a;color:#e0e0e0;min-height:100vh}
.container{max-width:480px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:24px;font-weight:800;letter-spacing:1px;
  background:linear-gradient(90deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3,#ff6b6b);
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  animation:flowText 3s linear infinite}
@keyframes flowText{to{background-position:200% center}}
.header p{color:#666;font-size:13px;margin-top:4px}
#home{display:block;text-align:center;padding:40px 20px}
.subtitle{color:#888;font-size:14px;line-height:1.8;margin-bottom:30px}
.btn-start{background:linear-gradient(135deg,#ff6b81,#ff4757);color:#fff;border:none;padding:14px 50px;border-radius:25px;font-size:17px;cursor:pointer;font-weight:bold;transition:transform .2s}
.btn-start:hover{transform:scale(1.05)}
#quiz{padding:20px 16px}
.progress-bar{width:100%;height:4px;background:#1a1a2e;border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff6b81,#ff4757);transition:width .3s;width:0%}
.q-num{font-size:13px;color:#ff6b81;margin-bottom:8px}
.q-text{font-size:18px;line-height:1.5;margin-bottom:20px;font-weight:600}
.options{display:flex;flex-direction:column;gap:10px}
.option{background:#151528;border:2px solid #252545;border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:15px}
.option:hover{border-color:#ff6b81;background:#1a1a35}
.option.selected{border-color:#ff6b81;background:rgba(255,107,129,.15)}
.opt-letter{width:28px;height:28px;border-radius:50%;background:#252545;color:#888;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;flex-shrink:0}
.option.selected .opt-letter{background:#ff6b81;color:#fff}
footer{text-align:center;color:#444;font-size:11px;padding:20px}

/* 结果页增强 */
.result-card-img{width:180px;height:180px;border-radius:20px;object-fit:cover;margin:0 auto 18px;display:block;border:3px solid rgba(255,255,255,.08)}
.result-name-bar{background:linear-gradient(135deg,#5f6cff,#7c5cfc);border-radius:12px;padding:14px 20px;margin-bottom:16px;text-align:center}
.result-name-bar h2{font-size:26px;color:#fff;margin:0}

/* 四维反差拆解 */
.dim-breakdown{margin-bottom:18px;background:rgba(255,255,255,.03);border-radius:12px;padding:14px 16px}
.dim-row{display:flex;align-items:center;margin-bottom:10px}
.dim-row:last-child{margin-bottom:0}
.dim-icon{font-size:14px;width:24px;flex-shrink:0}
.dim-label{font-size:13px;color:#999;width:40px;flex-shrink:0}
.dim-letter{font-size:13px;width:22px;flex-shrink:0;color:#888;text-align:center}
.dim-letter b{color:#fff;background:rgba(255,107,129,.15);padding:1px 5px;border-radius:4px;font-weight:700}
.dim-tilt-hot b{color:#ff4757;background:rgba(255,71,87,.25);text-shadow:0 0 8px rgba(255,71,87,.5)}
.dim-tilt-cold b{color:#48dbfb;background:rgba(72,219,251,.25);text-shadow:0 0 8px rgba(72,219,251,.5)}
.dim-bar-wrap{flex:1;display:flex;align-items:center;position:relative;height:20px;margin:0 4px;border-radius:10px;overflow:hidden;background:#151528}
.bar-hot{height:100%;background:linear-gradient(90deg,#ff6b6b,#ff4757);border-radius:10px 0 0 10px;transition:width .5s ease}
.bar-cold{height:100%;background:linear-gradient(90deg,#48dbfb,#7c5cfc);border-radius:0 10px 10px 0;transition:width .5s ease}
.dim-pct-center{display:none}
.bar-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:#fff;text-shadow:0 0 5px rgba(0,0,0,.9);white-space:nowrap;z-index:2;pointer-events:none}
/* 热侧/冷侧进度条 */
.bar-hot{height:8px;border-radius:4px 0 0 4px;transition:width .6s ease;background:linear-gradient(90deg,#ff6b81,#ff4757);position:relative}
.bar-cold{height:8px;border-radius:0 4px 4px 0;transition:width .6s ease;background:linear-gradient(90deg,#48dbfb,#7c5cfc);position:relative}
.result-slogan-sm{color:rgba(255,255,255,.75);font-size:13px;margin-top:4px;font-style:italic}
.desc-box{background:rgba(255,255,255,.04);border-left:4px solid #5f6cff;border-radius:0 12px 12px 0;padding:16px 18px;margin-bottom:16px;line-height:1.9;font-size:15px;color:#ccc}
.roast-box{background:linear-gradient(135deg,rgba(255,107,129,.08),rgba(255,71,87,.04));border-left:4px solid #ff6b81;border-radius:0 12px 12px 0;padding:14px 18px;margin-bottom:14px;text-align:left}
.roast-label{color:#ff6b81;font-size:13px;margin-bottom:6px;font-weight:600}
.roast-text{color:#ffa0ab;font-size:14px;line-height:1.7;font-style:italic}
.heal-box{background:linear-gradient(135deg,rgba(72,219,251,.06),rgba(159,168,218,.03));border-left:4px solid #48dbfb;border-radius:0 12px 12px 0;padding:14px 18px;margin-bottom:20px;text-align:left}
.heal-label{color:#48dbfb;font-size:13px;margin-bottom:6px;font-weight:600}
.heal-text{color:#9de8fb;font-size:14px;line-height:1.7}
.tags-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px}
.rarity-row{text-align:center;margin:12px 0}.rarity-bar{display:inline-block;padding:6px 16px;border-radius:20px;font-size:14px;color:#ffd700;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.25);animation:fadeIn .5s ease}.rarity-num{font-weight:700;color:#ffd700;font-size:16px}
.tag-pill{background:rgba(255,255,255,.07);color:#999;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 14px;font-size:12px}
.btn-share{background:linear-gradient(135deg,#5f6cff,#7c5cfc);color:#fff;border:none;padding:14px 44px;border-radius:25px;font-size:17px;cursor:pointer;font-weight:bold;transition:transform .2s;display:inline-block}
.btn-share:hover{transform:scale(1.05)}

/* 分享卡片样式 */
#shareArea{display:none;position:fixed;top:-9999px;left:-9999px;width:420px;background:linear-gradient(180deg,#1a1a35,#12122a);border-radius:20px;overflow:hidden;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#shareArea .scard-header{padding:30px 24px 16px;text-align:center}
#shareArea .scard-title{font-size:22px;font-weight:800;color:#fff}
#shareArea .scard-sub{color:#888;font-size:12px;margin-top:2px}
#shareArea .scard-body{padding:0 20px}
#shareArea .scard-img{width:160px;height:160px;border-radius:16px;object-fit:cover;margin:0 auto 14px;display:block;border:3px solid rgba(95,108,255,.3)}
#shareArea .scard-name-bar{background:linear-gradient(135deg,#5f6cff,#7c5cfc);border-radius:10px;padding:10px 16px;text-align:center;margin-bottom:12px}
#shareArea .scard-name-bar h3{font-size:20px;color:#fff;margin:0}
#shareArea .scard-name-bar p{color:rgba(255,255,255,.7);font-size:11px;margin-top:2px;font-style:italic}
#shareArea .scard-desc{background:rgba(255,107,129,.06);border-left:3px solid #ff6b81;border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;line-height:1.7;color:#bbb;margin-bottom:10px}
.scard-roast-label{font-size:13px;color:#ff6b81;margin:12px 0 4px;font-weight:700}
#shareArea .scard-heal-label{color:#48dbfb;font-size:12px;margin-bottom:4px}
#shareArea .scard-heal-text{color:#9de8fb;font-size:12.5px;line-height:1.65;margin-bottom:12px}
#shareArea .scard-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px}
#shareArea .scard-tag{background:rgba(255,255,255,.06);color:#777;border-radius:14px;padding:3px 11px;font-size:11px}
#shareArea .scard-banner{background:linear-gradient(90deg,#ff6b81,#feca57,#48dbfb,#ff9ff3);text-align:center;padding:10px;font-size:14px;font-weight:800;color:#fff}
#shareArea .scard-footer{background:rgba(0,0,0,.3);text-align:center;padding:10px;font-size:11px;color:#555}

/* 卡片预览弹窗 */
#cardOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#cardLoading{color:#888;font-size:15px}
#cardPreviewWrap{display:none}
#cardPreview{max-width:90%;max-height:80vh;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.5)}

/* 隐藏人格徽章 */
.hidden-badge{display:inline-block;background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e;font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;margin-top:8px;letter-spacing:1px;box-shadow:0 2px 10px rgba(255,170,0,.3);animation:badgePop .5s cubic-bezier(.34,1.56,.64,1)}
.hidden-congrats{color:#ffd700;font-size:14px;text-align:center;margin:8px 0;font-weight:600;letter-spacing:1px;text-shadow:0 0 10px rgba(255,215,0,.2)}
@keyframes badgePop{0%{transform:scale(0) rotate(-10deg);opacity:0}70%{transform:scale(1.1) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
</style>
</head>

let currentQ = 0;
let userChoices = [];
let resultTypeData = null;

function startQuiz() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  currentQ = 0;
  userChoices = [];
  showQuestion();
}

function showQuestion() {
  const q = QUESTIONS[currentQ];
  const progress = (currentQ / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  
  let html = '<div class="q-num">第 ' + (currentQ+1) + '/' + QUESTIONS.length + ' 题</div>';
  html += '<div class="q-text">' + q.q + '</div>';
  html += '<div class="options">';
  const letters = ['A','B','C','D'];
  var idxArr = [0,1,2,3];
  for (var i = 3; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = idxArr[i]; idxArr[i] = idxArr[j]; idxArr[j] = tmp;
  }
  for (var di = 0; di < 4; di++) {
    var origIdx = idxArr[di];
    html += '<div class="option" onclick="selectOption('+origIdx+')">';
    html += '<span class="opt-letter">'+letters[di]+'</span>';
    html += '<span>'+q.options[origIdx].text+'</span>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('quizContent').innerHTML = html;
}

function selectOption(origIdx) {
  const q = QUESTIONS[currentQ];
  const opt = q.options[origIdx];
  userChoices.push(origIdx);
  
  var scores = {H:0,C:0,F:0,S:0,L:0,Q:0,X:0,D:0};
  for (var ci = 0; ci < userChoices.length; ci++) {
    const cq = QUESTIONS[ci];
    const co = cq.options[userChoices[ci]];
    for (var sk in co.score) { scores[sk] += co.score[sk]; }
  }
  
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showResult(scores);
  } else {
    showQuestion();
  }
}

function renderDimBars(scores, finalType) {
  const dims = [
    { icon:'🔥', label:'能量', hot:'H', cold:'C', hotName:'热烈', coldName:'冷静' },
    { icon:'⚡', label:'决策', hot:'F', cold:'S', hotName:'快速', coldName:'缓慢' },
    { icon:'🎤', label:'社交', hot:'L', cold:'Q', hotName:'外放', coldName:'内敛' },
    { icon:'🛡️', label:'应对', hot:'X', cold:'D', hotName:'爆发', coldName:'防御' }
  ];
  const total = scores.H + scores.C + scores.F + scores.S + scores.L + scores.Q + scores.X + scores.D || 1;
  
  let html = '';
  const dimKeys = ['H','C','F','S','L','Q','X','D'];
  for (let i = 0; i < dims.length; i++) {
    const d = dims[i];
    const h = scores[d.hot] || 0, c = scores[d.cold] || 0;
    const sum = h + c;
    const hp = sum ? Math.round(h / sum * 100) : 50;
    const cp = 100 - hp;
    const isTie = hp === cp;
    
    // 用finalType决定哪个字母高亮（你的实际人格字母）
    let hotCls = '', coldCls = '';
    if (finalType) {
      // finalType第i位：0→H/C, 1→F/S, 2→L/Q, 3→X/D
      const typeChar = finalType[i] || '';
      if (typeChar === d.hot) hotCls = ' dim-tilt-hot';   // 你的字母在热侧→热侧红
      else if (typeChar === d.cold) coldCls = ' dim-tilt-cold'; // 你的字母在冷侧→冷侧蓝
    }
    
    html += '<div class="dim-row">';
    html += '<span class="dim-icon">'+d.icon+'</span>';
    html += '<span class="dim-label">'+d.label+'</span>';
    html += '<span class="dim-letter'+hotCls+'"><b>'+d.hot+'</b></span>';
    html += '<div class="dim-bar-wrap">';
    if (hp > 0) html += '<div class="bar-hot" style="width:'+hp+'%"><span class="bar-pct">'+hp+'%</span></div>';
    if (cp > 0 && hp < 100) html += '<div class="bar-cold" style="width:'+cp+'%"><span class="bar-pct">'+cp+'%</span></div>';
    html += '</div>';
    html += '<span class="dim-letter'+coldCls+'"><b>'+d.cold+'</b></span>';
    html += '</div>';
  }
  
  document.getElementById('dimBreakdown').innerHTML = html;
}

function showResult(scores) {
  var typeStr = '';
  typeStr += (scores.H >= scores.C ? 'H' : 'C');
  typeStr += (scores.F >= scores.S ? 'F' : 'S');
  typeStr += (scores.L >= scores.Q ? 'L' : 'Q');
  typeStr += (scores.X >= scores.D ? 'X' : 'D');

  var finalType = typeStr;

  // 隐藏人格检测（分布优化版v3）
  // 统计极端维度和平局维度
  var hotExtreme = 0, coldExtreme = 0, tieCount = 0;
  if (scores.H >= 6) hotExtreme++;
  if (scores.F >= 6) hotExtreme++;
  if (scores.L >= 6) hotExtreme++;
  if (scores.X >= 6) hotExtreme++;
  if (scores.C >= 6) coldExtreme++;
  if (scores.S >= 6) coldExtreme++;
  if (scores.Q >= 6) coldExtreme++;
  if (scores.D >= 6) coldExtreme++;
  if (scores.H === scores.C) tieCount++;
  if (scores.F === scores.S) tieCount++;
  if (scores.L === scores.Q) tieCount++;
  if (scores.X === scores.D) tieCount++;

  // 隐藏人格检测：得分模式+结果替换（方案A）
  // 优先级：完美平衡 > 高度平衡 > 极端热侧 > 极端冷侧
  if (tieCount === 4) finalType = 'EXTREME_D';                                          // 4维全平局（<0.1%）
  else if (tieCount >= 3) {
    var totalHot = scores.H + scores.F + scores.L + scores.X;
    if (totalHot >= 15 && totalHot <= 17) finalType = 'EXTREME_C';                     // ≥3维平局且总体平衡（约4%）
  }
  else if (typeStr === 'HFLX' && hotExtreme >= 3) finalType = 'EXTREME_A';             // HFLX且≥3维热侧≥6（约1%）
  else if (typeStr === 'CSQD' && coldExtreme >= 3) finalType = 'EXTREME_B';            // CSQD且≥3维冷侧≥6（约1%）

  window.finalType = finalType;
  const t = TYPES[finalType] || TYPES[typeStr];
  resultTypeData = t;

  // 渲染四维反差拆解条（隐藏人格用finalType故意让字母不变色，和常规人格视觉区分）
  renderDimBars(scores, finalType);

  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  
  // 卡牌图
  var imgEl = document.getElementById('resultImg');
  if(t.img){imgEl.src=t.img}else{imgEl.style.display='none'}
  imgEl.onerror=function(){this.style.display='none'};
  
  // 名称条（不含emoji，图片已显示）
  document.getElementById('resultTitle').textContent = t.name;
  document.getElementById('resultSlogan').textContent = t.slogan || '';
  document.getElementById('resultCode').textContent = '[' + t.code + ']';
  
  // 隐藏人格徽章
  var badgeEl = document.getElementById('hiddenBadge');
  if (t.isHidden) {
    badgeEl.innerHTML = '<div class="hidden-badge">🏆 隐藏人格</div><div class="hidden-congrats">恭喜你解锁了稀有隐藏人格！</div>';
  } else {
    badgeEl.innerHTML = '';
  }

  // 稀有度百分比
  var rarityEl = document.getElementById('resultRarity');
  if (rarityEl && t.rarity) {
    var onlyText = (finalType === 'HFLX') ? '' : '仅 ';
    rarityEl.innerHTML = '<div class="rarity-bar">📊 全站' + onlyText + '<span class="rarity-num">' + t.rarity.replace('%','') + '%</span> 的人测出这个人格</div>';
    rarityEl.style.display = 'block';
  } else if (rarityEl) {
    rarityEl.style.display = 'none';
  }
  
  // 描述
  document.getElementById('resultDesc').innerHTML = t.desc.replace(/\n/g,'<br>');
  
  // 毒舌金句 & 治愈金句
  document.getElementById('resultRoast').innerHTML = t.roast;
  document.getElementById('resultHeal').innerHTML = t.heal || '';
  
  // 标签
  var tagsHtml = '';
  var tagList = t.tags || ['#'+t.name];
  for(var ti=0;ti<tagList.length;ti++){
    tagsHtml+='<span class="tag-pill">'+tagList[ti]+'</span>';
  }
  document.getElementById('resultTags').innerHTML = tagsHtml;
  
  window.scrollTo(0,0);
  console.log('[BTI] Result:', t.name, t.code, 'img:', t.img);
}

// 分析卡片 - 生成后弹窗预览，用户决定是否下载
function shareCard(){
  if(!resultTypeData){alert('没有结果数据');return;}
  var t=resultTypeData;
  
  // 填充分享卡片内容
  document.getElementById('shareImg').src=t.img||'';
  document.getElementById('shareImg').onerror=function(){this.style.display='none'};
  document.getElementById('shareName').textContent=t.name;
  document.getElementById('shareSlogan').textContent=t.slogan||'';
  var descText=t.roast.replace(/\n/g,'<br>');
  if(descText.length>120)descText=descText.substring(0,120)+'...';
  document.getElementById('shareDesc').innerHTML=descText;
  var healText=t.heal||'';
  if(healText.length>150)healText=healText.substring(0,150)+'...';
  document.getElementById('shareHeal').textContent=healText;
  
  var tagHtml='';
  var tl=(t.tags||['#'+t.name]).slice(0,4);
  for(var i=0;i<tl.length;i++){tagHtml+='<span class="scard-tag">'+tl[i]+'</span>';}
  document.getElementById('shareTags').innerHTML=tagHtml;
  
  // 填充隐藏人格信息
  document.getElementById('shareCode').textContent = (t.code || '').toUpperCase();
  var hiddenBadge = document.getElementById('shareHiddenBadge');
  if (t.isHidden) { hiddenBadge.style.display = 'block'; } else { hiddenBadge.style.display = 'none'; }
  var shareOnlyText = (window.finalType === 'HFLX') ? '' : '仅 ';
  document.getElementById('shareRarity').innerHTML = '📊 全站' + shareOnlyText + '<span style="color:#ffd700;font-size:16px;">' + (t.rarity || '').replace('%','') + '%</span> 的人测出这个人格';

  // 显示加载中状态
  var overlay=document.getElementById('cardOverlay');
  var previewImg=document.getElementById('cardPreview');
  var cardActions=document.getElementById('cardActions');
  overlay.style.display='flex';
  previewImg.style.display='none';
  cardActions.style.display='none';
  document.getElementById('cardLoading').style.display='block';
  
  // 渲染卡片到canvas
  var sa=document.getElementById('shareArea');
  sa.style.display='block';
  sa.style.position='fixed';sa.style.left='-9999px';sa.style.top='0';
  
  setTimeout(function(){
    html2canvas(sa,{
      backgroundColor:'#12122a',scale:2,useCORS:true,
      allowTaint:true,logging:false
    }).then(function(canvas){
      sa.style.display='none';
      // 在overlay中显示预览图
      var wrap=document.getElementById('cardPreviewWrap');
      wrap.style.display='block';
      previewImg.src=canvas.toDataURL('image/png');
      previewImg.style.display='block';
      cardActions.style.display='flex';
      document.getElementById('cardLoading').style.display='none';
      
      // 存储下载链接
      previewImg.dataset.downloadUrl=canvas.toDataURL('image/png');
    }).catch(function(e){
      console.error('[BTI] shareCard error:',e);
      alert('生成失败，请稍后重试');overlay.style.display='none';sa.style.display='none';
    });
  },300);
}

// 下载卡片
function downloadCard(){
  var url=document.getElementById('cardPreview').dataset.downloadUrl;
  if(!url){alert('图片未准备好');return;}
  var link=document.createElement('a');
  link.download='BTI-'+resultTypeData.code+'-分析卡片.png';
  link.href=url;link.click();
}

// 关闭卡片预览
function closeCardPreview(){
  document.getElementById('cardOverlay').style.display='none';
}
